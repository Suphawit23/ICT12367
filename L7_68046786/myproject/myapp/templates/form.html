<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>บันทึกข้อมูลพนักงาน</h1>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="กรอกชื่อ-นามสกุล">

        <label>Email</label>
        <input type="email" placeholder="example@email.com">

        <label>Position</label>
        <select>
            <option>Manager</option>
            <option>Staff</option>
            <option>Intern</option>
        </select>

        <label>Phone Number</label>
        <input type="text" placeholder="08xxxxxxxx">

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
